<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#06070d" />

    <!-- Primary SEO -->
    <meta
      name="description"
      content="The complete FIFA World Cup 2026 schedule — all 104 matches across the USA, Canada & Mexico, from the group stage to the final in New Jersey. Filter by group, star your teams, and get free match reminders."
    />
    <meta
      name="keywords"
      content="World Cup 2026, FIFA World Cup 2026 schedule, World Cup fixtures, World Cup 2026 groups, World Cup bracket, soccer schedule, football fixtures, World Cup match reminders, USA Canada Mexico 2026"
    />
    <meta name="author" content="Summer of Goals" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://summerofgoals.com/" />

    <!-- Open Graph (Facebook, iMessage, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Summer of Goals" />
    <meta property="og:title" content="World Cup 2026 Schedule — All 104 Matches, Groups to Final" />
    <meta
      property="og:description"
      content="The complete FIFA World Cup 2026 schedule — all 104 matches across the USA, Canada & Mexico. Filter by group, star your teams, and get free match reminders."
    />
    <meta property="og:url" content="https://summerofgoals.com/" />
    <meta property="og:image" content="https://summerofgoals.com/logo512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="World Cup 2026 Schedule — All 104 Matches, Groups to Final" />
    <meta
      name="twitter:description"
      content="The complete FIFA World Cup 2026 schedule — all 104 matches across the USA, Canada & Mexico. Filter by group, star your teams, and get free match reminders."
    />
    <meta name="twitter:image" content="https://summerofgoals.com/logo512.png" />

    <!-- Structured data: helps Google show a rich event result -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsEvent",
        "name": "FIFA World Cup 2026",
        "sport": "Association football",
        "description": "The 2026 FIFA World Cup — 104 matches across the United States, Canada and Mexico.",
        "startDate": "2026-06-11",
        "endDate": "2026-07-19",
        "eventStatus": "https://schema.org/EventScheduled",
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "image": "https://summerofgoals.com/logo512.png",
        "url": "https://summerofgoals.com/",
        "location": [
          { "@type": "Country", "name": "United States" },
          { "@type": "Country", "name": "Canada" },
          { "@type": "Country", "name": "Mexico" }
        ],
        "organizer": {
          "@type": "Organization",
          "name": "FIFA",
          "url": "https://www.fifa.com/"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>World Cup 2026 Schedule — All 104 Matches, Groups to Final</title>
  </head>
